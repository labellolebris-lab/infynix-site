
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tab CS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="logo.png" type="image/png">

    <style>
        :root {
            --bg: #ffffff;
            --apple-gray: #f5f5f7;
            --text: #1d1d1f;
            --text-secondary: #86868b;
            --accent: #0071e3;
            --border: #d2d2d7;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        html, body { height: 100%; }
        body {
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            letter-spacing: -0.015em;
        }

        /* NAV */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            height: 52px;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 1000;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
        }
        .nav-container {
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
            padding: 0 20px;
            display: flex;
            align-items: center;
        }
        .nav-brand {
            text-decoration: none;
            color: var(--text);
            font-weight: 800;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .nav-logo-small { height: 24px; width: auto; }

        /* MAIN */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 80px 20px 60px;
            min-height: 100vh;
        }

        .error-code {
            font-size: 160px;
            font-weight: 700;
            letter-spacing: -0.05em;
            line-height: 1;
            color: var(--text);
            margin-bottom: 12px;
            animation: fadeUp 0.6s cubic-bezier(0.22,1,0.36,1) forwards;
            opacity: 0;
        }
        .error-line {
            width: 60px;
            height: 3px;
            background: var(--accent);
            margin: 0 auto 36px;
            animation: fadeUp 0.6s 0.1s cubic-bezier(0.22,1,0.36,1) forwards;
            opacity: 0;
        }
        .error-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 16px;
            animation: fadeUp 0.6s 0.15s cubic-bezier(0.22,1,0.36,1) forwards;
            opacity: 0;
        }
        .error-desc {
            font-size: 18px;
            color: var(--text-secondary);
            max-width: 480px;
            line-height: 1.6;
            margin-bottom: 48px;
            animation: fadeUp 0.6s 0.2s cubic-bezier(0.22,1,0.36,1) forwards;
            opacity: 0;
        }
        .error-actions {
            display: flex;
            gap: 14px;
            justify-content: center;
            flex-wrap: wrap;
            animation: fadeUp 0.6s 0.28s cubic-bezier(0.22,1,0.36,1) forwards;
            opacity: 0;
        }
        .btn-home {
            background: #000;
            color: #fff;
            padding: 15px 32px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            display: inline-block;
            transition: opacity 0.2s;
        }
        .btn-home:hover { opacity: 0.75; }
        .btn-back {
            background: transparent;
            color: var(--text);
            padding: 14px 32px;
            border: 1.5px solid var(--border);
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            display: inline-block;
            cursor: pointer;
            transition: border-color 0.2s;
            font-family: inherit;
        }
        .btn-back:hover { border-color: #000; }

        /* URL display */
        .bad-url {
            margin-top: 50px;
            background: var(--apple-gray);
            border: 1px solid var(--border);
            padding: 12px 20px;
            font-size: 13px;
            color: var(--text-secondary);
            max-width: 560px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            animation: fadeUp 0.6s 0.35s cubic-bezier(0.22,1,0.36,1) forwards;
            opacity: 0;
        }
        .bad-url span { color: #c0392b; font-weight: 600; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* FOOTER */
        footer {
            text-align: center;
            padding: 20px;
            font-size: 13px;
            color: var(--text-secondary);
            border-top: 1px solid var(--border);
        }
        footer a { color: var(--text-secondary); text-decoration: none; }
        footer a:hover { color: var(--text); }
    </style>
</head>
<body>

    <nav>
        <div class="nav-container">
            <a href="index.html" class="nav-brand" <p> 
                <img src="logo.jpg" alt="INFYNIX" class="nav-logo-small">
                
            </a>
        </div>
    </nav>

    <main>
        <div class="error-code">Tab CS</div>
<br>
        <div class="error-line"></div>
        <h1 class="error-title">Coming soon</h1>
        <p class="error-desc">Please wait</p>
        <div class="error-actions">
        </div>
        <div class="bad-url" id="bad-url-box" style="display:none;">
            <span>404</span> &nbsp;·&nbsp; <span id="bad-url-text"></span>
        </div>
    </main>

    <footer>
        © 2026 Infynix Corporation. All rights reserved. &nbsp;·&nbsp;
        <a href="legalnotice.html">Legal Notice</a>
    </footer>


</body>
</html>
